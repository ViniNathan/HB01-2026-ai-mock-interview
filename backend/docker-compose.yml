name: hackathon2026

services:
  postgres:
    image: postgres:17
    container_name: hackathon2026-postgres
    environment:
      POSTGRES_DB: hackathon2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hackathon2026_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  hackathon2026_postgres_data:
